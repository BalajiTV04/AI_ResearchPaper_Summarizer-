services:
  # Backend FastAPI Web Service
  - type: web
    name: ai-researchpaper-summarizer
    runtime: python
    repo: https://github.com/BalajiTV04/AI_ResearchPaper_Summarizer-.git
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    # Procfile is also provided at backend/Procfile as fallback
    envVars:
      - key: MERCURY_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DATABASE
        value: research_summarizer
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://ai-based-research-paper-summarizer.vercel.app
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONPATH
        value: /opt/render/project/src/backend
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    healthCheckPath: /
    autoDeploy: true
