<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PaperAI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="auth-container">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p>Login to your account</p>
      <div id="errorMsg" class="auth-error hidden"></div>
      <form id="loginForm">
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" style="width:100%; margin-top: 8px;">Login</button>
      </form>
      <p class="auth-link">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    renderAuthNavbar();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');

        localStorage.setItem('token', data.token);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
