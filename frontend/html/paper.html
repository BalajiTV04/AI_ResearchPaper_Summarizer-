<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Details - PaperAI</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Floating Chatbot Styles */
    .robot-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border: none;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      z-index: 1000;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .robot-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(99, 102, 241, 0.4);
    }
    .chat-panel {
      position: fixed;
      bottom: 96px;
      right: 24px;
      width: 400px;
      max-height: 600px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      z-index: 999;
      animation: slideUp 0.3s ease;
    }
    .chat-panel.open { display: flex; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.25);
    }
    .chat-header-info { display: flex; align-items: center; gap: 12px; }
    .chat-header-info .robot-icon { font-size: 28px; }
    .chat-header h3 { font-family: var(--font-display); font-size: 1rem; margin: 0; }
    .chat-subtitle { font-size: 0.75rem; color: var(--text-muted); margin: 2px 0 0 0; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-close-btn {
      background: rgba(255,255,255,0.1); border: 1px solid var(--border);
      color: var(--text-muted); padding: 6px 14px; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem; transition: all 0.2s; font-family: var(--font-sans);
    }
    .chat-close-btn:hover { background: rgba(255,255,255,0.2); color: white; }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 12px;
      max-height: 380px;
    }
    .chat-welcome { text-align: center; color: var(--text-muted); padding: 40px 20px; font-size: 1rem; }
    .chat-msg { max-width: 85%; padding: 10px 16px; border-radius: 14px; line-height: 1.5; font-size: 0.9rem; }
    .chat-msg.user { align-self: flex-end; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); border-bottom-right-radius: 4px; }
    .chat-msg.ai { align-self: flex-start; background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; opacity: 0.7; }
    .msg-content { word-wrap: break-word; }
    .msg-content ul { margin: 4px 0; padding-left: 20px; }
    .msg-content li { margin-bottom: 2px; }
    .msg-content strong { color: var(--accent-purple); }
    .chat-input-area {
      display: flex; padding: 12px 16px; gap: 8px;
      border-top: 1px solid var(--border); background: rgba(0,0,0,0.2);
    }
    .chat-input-area input { flex: 1; margin: 0; padding: 10px 14px; font-size: 0.9rem; }
    .chat-send-btn {
      background: var(--accent-blue); color: white; border: none;
      width: 40px; height: 40px; border-radius: 50%; font-size: 1rem;
      transition: all 0.2s; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-send-btn:hover { background: var(--accent-purple); }
    .chat-send-btn:disabled { background: rgba(255,255,255,0.1); cursor: not-allowed; }
    .typing-indicator { display: flex; gap: 6px; padding: 4px 0; }
    .typing-indicator span {
      width: 8px; height: 8px; background: var(--text-muted);
      border-radius: 50%; animation: pulse 1.4s ease-in-out infinite both;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:0.4;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    
    /* Images Section Styles */
    .images-section {
      width: 100%;
    }
    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .image-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s ease;
    }
    .image-card:hover {
      transform: translateY(-2px);
    }
    .image-placeholder {
      width: 100%;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
    }
    .image-placeholder span {
      font-size: 48px;
      opacity: 0.5;
    }
    .image-caption {
      padding: 12px 16px;
      margin: 0;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="container">
    <!-- Loading -->
    <div id="loadingPaper">
      <div style="padding: 40px;">
        <div class="skeleton" style="width: 50%; height: 32px; margin-bottom: 20px;"></div>
        <div class="skeleton" style="width: 30%; height: 16px; margin-bottom: 32px;"></div>
        <div class="skeleton" style="width: 100%; height: 200px;"></div>
      </div>
    </div>

    <!-- Paper content -->
    <div id="paperContent" class="hidden">
      <div class="paper-header">
        <div>
          <h1 id="paperTitle">Untitled Paper</h1>
          <p id="paperMeta" style="color: var(--text-muted); margin-top: 4px;"></p>
        </div>
        <div class="paper-actions">
          <button class="action-btn" onclick="openQuiz()">❓ Quiz</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('summary')">Summary</button>
        <button class="tab" onclick="switchTab('keypoints')">Key Points</button>
        <button class="tab" onclick="switchTab('info')">Information</button>
      </div>

      <div id="tabContent" class="content">
        <!-- Summary Tab -->
        <div id="tabSummary" class="tab-panel">
          <div id="summaryGenerate" class="generate-section">
            <p>Generate AI summaries of this paper</p>
            <button class="btn-primary" onclick="generateSummaries()">Generate Summary</button>
          </div>
          <div id="summaryDisplay" class="summary-grid hidden"></div>
        </div>
        <!-- Key Points Tab -->
        <div id="tabKeypoints" class="tab-panel hidden">
          <div id="kpGenerate" class="generate-section">
            <p>Extract key points from the paper</p>
            <button class="btn-primary" onclick="extractKeyPoints()">Extract Key Points</button>
          </div>
          <div id="kpDisplay" class="keypoints-grid hidden"></div>
          <div style="margin-top: 20px;">
            <button class="btn-primary" onclick="loadImages()" id="loadImagesBtn">📷 View Important Figures & Images</button>
            <div id="imagesSection" class="images-section" style="margin-top: 16px;"></div>
          </div>
        </div>
        <!-- Info Tab -->
        <div id="tabInfo" class="tab-panel hidden">
          <div class="glass-card" style="padding: 24px;">
            <h3 style="font-family:var(--font-display); margin-bottom: 16px;">Paper Details</h3>
            <div id="paperDetails"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Floating Chatbot -->
  <button class="robot-btn" id="robotBtn" onclick="toggleChat()">🤖</button>

  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <div class="chat-header-info">
        <span class="robot-icon">🤖</span>
        <div>
          <h3>AI Chat Assistant</h3>
          <p class="chat-subtitle" id="chatSubtitle">Research Paper</p>
        </div>
      </div>
      <button class="chat-close-btn" onclick="toggleChat()">← Back</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-welcome">👋 Ask me anything about this research paper!</div>
    </div>
    <form class="chat-input-area" onsubmit="sendChatMessage(event)">
      <input type="text" id="chatInput" placeholder="Ask a question..." autocomplete="off">
      <button type="submit" class="chat-send-btn" id="chatSendBtn">➤</button>
    </form>
  </div>

  <script src="app.js"></script>
  <script>
    if (!checkAuth()) return;
    renderNavbar();

    const urlParams = new URLSearchParams(window.location.search);
    const paperId = urlParams.get('id');
    if (!paperId) {
      document.getElementById('loadingPaper').innerHTML = '<div class="error-msg">No paper ID provided</div>';
      throw new Error('No paper ID');
    }

    let paper = null;

    async function loadPaper() {
      try {
        paper = await apiGet(`/papers/${paperId}`);
        document.getElementById('loadingPaper').classList.add('hidden');
        document.getElementById('paperContent').classList.remove('hidden');
        document.getElementById('paperTitle').textContent = paper.title || 'Untitled Paper';
        document.getElementById('paperMeta').textContent = `${paper.page_count || '?'} pages • Uploaded ${formatDate(paper.uploaded_at)}`;
        document.getElementById('chatSubtitle').textContent = paper.title || 'Research Paper';
        renderInfo();
      } catch (err) {
        document.getElementById('loadingPaper').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    function renderInfo() {
      document.getElementById('paperDetails').innerHTML = `
        <p><strong>Filename:</strong> ${paper.filename || 'N/A'}</p>
        <p><strong>Uploaded:</strong> ${new Date(paper.uploaded_at).toLocaleString()}</p>
        <p><strong>Page Count:</strong> ${paper.page_count || 'N/A'}</p>
      `;
    }

    // --- Tabs ---
    let currentTab = 'summary';
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
      document.querySelector(`.tab:nth-child(${tab === 'summary' ? 1 : tab === 'keypoints' ? 2 : 3})`).classList.add('active');
      document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.remove('hidden');
    }

    // --- Images ---
    let extractedPdfImages = [];
    let imageDescriptions = [];

    async function loadImages() {
      const btn = document.getElementById('loadImagesBtn');
      if (btn) btn.disabled = true;
      try {
        // Load actual extracted images from PDF
        try {
          const imgData = await apiGet(`/papers/${paperId}/images`);
          extractedPdfImages = imgData.images || [];
        } catch (err) {
          console.error('Failed to extract PDF images:', err);
        }
        // Load AI descriptions
        try {
          const descData = await apiPost(`/ai/images/${paperId}`, {});
          imageDescriptions = descData.images || [];
        } catch (err) {
          console.error('Failed to load image descriptions:', err);
        }
        renderImagesSection();
      } catch (err) {
        showToast('Failed: ' + err.message);
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    function renderImagesSection() {
      const container = document.getElementById('imagesSection');
      if (!container) return;
      
      let html = '';
      
      // Actual extracted images
      if (extractedPdfImages.length > 0) {
        html += `<h4 style="margin: 16px 0 8px;">📸 Extracted Images from PDF</h4>`;
        html += `<div class="images-grid">`;
        extractedPdfImages.forEach(img => {
          html += `
            <div class="image-card">
              <div class="image-placeholder" style="padding: 4px; background: var(--card-bg);">
                <img src="${API_URL}${img.url}" 
                     alt="Figure from page ${img.page_number}"
                     style="width: 100%; height: auto; max-height: 300px; object-fit: contain; border-radius: 8px; background: white;"
                     loading="lazy"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                <div class="image-placeholder" style="display: none;"><span>📊</span></div>
              </div>
              <p class="image-caption"><strong>Figure from Page ${img.page_number}</strong></p>
            </div>
          `;
        });
        html += `</div>`;
      }
      
      // AI descriptions
      if (imageDescriptions.length > 0) {
        html += `<h4 style="margin: 16px 0 8px;">📝 AI-Identified Figures</h4>`;
        html += `<div class="images-grid">`;
        imageDescriptions.forEach((img, idx) => {
          html += `
            <div class="image-card">
              <div class="image-placeholder"><span>📊</span></div>
              <p class="image-caption">
                <strong>${img.title || img.type || 'Figure ' + (idx + 1)}</strong>
                ${img.description ? '<br/>' + img.description : ''}
                ${img.page_context ? '<br/><em style="opacity:0.7">📍 ' + img.page_context + '</em>' : ''}
              </p>
            </div>
          `;
        });
        html += `</div>`;
      }
      
      if (!html) {
        html = '<p style="text-align:center;color:var(--text-muted);padding:20px;">No images found in this paper.</p>';
      }
      
      container.innerHTML = html;
    }

    // --- Summaries ---
    let summaryData = null;
    async function generateSummaries() {
      const btn = document.querySelector('#summaryGenerate .btn-primary');
      btn.disabled = true; btn.textContent = 'Generating...';
      try {
        summaryData = await apiPost(`/ai/summarize/${paperId}`, {});
        document.getElementById('summaryGenerate').classList.add('hidden');
        const display = document.getElementById('summaryDisplay');
        display.classList.remove('hidden');
        display.innerHTML = `
          <div class="summary-card"><h3>📌 Short Summary</h3><p>${summaryData.short_summary || 'N/A'}</p></div>
          <div class="summary-card"><h3>📖 Detailed Summary</h3><p>${summaryData.detailed_summary || 'N/A'}</p></div>
          <div class="summary-card"><h3>👶 ELI5</h3><p>${summaryData.eli5_summary || 'N/A'}</p></div>
        `;
      } catch (err) { showToast('Failed: ' + err.message); }
      finally { btn.disabled = false; btn.textContent = 'Generate Summary'; }
    }

    // --- Key Points ---
    let kpData = null;
    async function extractKeyPoints() {
      const btn = document.querySelector('#kpGenerate .btn-primary');
      btn.disabled = true; btn.textContent = 'Extracting...';
      try {
        kpData = await apiPost(`/ai/keypoints/${paperId}`, {});
        document.getElementById('kpGenerate').classList.add('hidden');
        const display = document.getElementById('kpDisplay');
        display.classList.remove('hidden');
        display.innerHTML = `
          <div class="kp-section"><h3>🎯 Concepts</h3><ul>${(kpData.concepts || []).map(c => `<li>${c}</li>`).join('')}</ul></div>
          <div class="kp-section"><h3>🔬 Methodology</h3><ul>${(kpData.methodology || []).map(m => `<li>${m}</li>`).join('')}</ul></div>
          <div class="kp-section"><h3>📈 Results</h3><ul>${(kpData.results || []).map(r => `<li>${r}</li>`).join('')}</ul></div>
          <div class="kp-section"><h3>✅ Conclusions</h3><ul>${(kpData.conclusions || []).map(c => `<li>${c}</li>`).join('')}</ul></div>
        `;
      } catch (err) { showToast('Failed: ' + err.message); }
      finally { btn.disabled = false; btn.textContent = 'Extract Key Points'; }
    }

    // --- Quiz ---
    function openQuiz() {
      window.location.href = `quiz.html?id=${paperId}`;
    }

    // --- Floating Chatbot ---
    let chatOpen = false;
    let chatMessages = [];
    
    function toggleChat() {
      chatOpen = !chatOpen;
      document.getElementById('chatPanel').classList.toggle('open', chatOpen);
      document.getElementById('robotBtn').textContent = chatOpen ? '✕' : '🤖';
      if (chatOpen && chatMessages.length === 0) loadChatHistory();
    }

    async function loadChatHistory() {
      try {
        chatMessages = await apiGet(`/chat/${paperId}`);
        renderChatMessages();
      } catch (err) { console.error('Failed to load chat history', err); }
    }

    function renderChatMessages() {
      const container = document.getElementById('chatMessages');
      if (chatMessages.length === 0) {
        container.innerHTML = '<div class="chat-welcome">👋 Ask me anything about this research paper!</div>';
        return;
      }
      container.innerHTML = chatMessages.map(msg => `
        <div class="chat-msg ${msg.role === 'user' ? 'user' : 'ai'}">
          <div class="msg-label">${msg.role === 'user' ? 'You' : 'AI'}</div>
          <div class="msg-content">${formatContent(msg.content)}</div>
        </div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    }

    async function sendChatMessage(e) {
      e.preventDefault();
      const input = document.getElementById('chatInput');
      const sendBtn = document.getElementById('chatSendBtn');
      const msg = input.value.trim();
      if (!msg || sendBtn.disabled) return;

      input.value = '';
      sendBtn.disabled = true;

      // Add user message
      chatMessages.push({ role: 'user', content: msg });
      renderChatMessages();

      // Show typing
      const container = document.getElementById('chatMessages');
      container.innerHTML += `<div class="chat-msg ai"><div class="msg-label">AI</div><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
      container.scrollTop = container.scrollHeight;

      try {
        const data = await apiPost(`/chat/${paperId}`, { message: msg });
        // Remove typing indicator
        chatMessages.push({ role: 'assistant', content: data.response });
        renderChatMessages();
      } catch (err) {
        chatMessages.push({ role: 'assistant', content: '⚠️ Error: ' + err.message });
        renderChatMessages();
      } finally {
        sendBtn.disabled = false;
      }
    }

    loadPaper();
  </script>
</body>
</html>
