<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - PaperAI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="auth-container">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p>Sign up to get started with AI-powered research</p>
      <div id="errorMsg" class="auth-error hidden"></div>
      <form id="registerForm">
        <div>
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn-primary" style="width:100%; margin-top: 8px;">Create Account</button>
      </form>
      <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    renderAuthNavbar();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');

      try {
        const res = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Registration failed');

        // Auto-login after registration
        const loginRes = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const loginData = await loginRes.json();
        if (loginRes.ok) {
          localStorage.setItem('token', loginData.token);
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'login.html';
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
