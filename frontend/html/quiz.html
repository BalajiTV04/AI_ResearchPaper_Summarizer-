<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - PaperAI</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .quiz-title {
      font-family: var(--font-display);
      font-size: 2.5rem;
      margin-bottom: 12px;
      text-align: center;
    }
    .quiz-subtitle {
      color: var(--text-muted);
      margin-bottom: 32px;
      font-size: 1.05rem;
      text-align: center;
    }

    /* Progress Bar */
    .progress-bar-quiz {
      display: flex;
      justify-content: center;
      gap: 48px;
      margin-bottom: 40px;
    }
    .progress-item-quiz {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .progress-dot {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      background: rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }
    .progress-dot.completed {
      background: rgba(16, 185, 129, 0.2);
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
    }

    /* Difficulty Cards */
    .difficulty-grid {
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
    }
    .difficulty-card {
      flex: 1;
      padding: 28px 20px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--glass);
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .difficulty-card:hover:not(:disabled) {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .difficulty-card:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .difficulty-card.completed {
      opacity: 0.85;
    }
    .diff-icon { font-size: 2.2rem; margin-bottom: 8px; }
    .difficulty-card h3 { font-family: var(--font-display); font-size: 1.3rem; margin: 0; }
    .diff-desc { font-size: 0.85rem; color: var(--text-muted); margin: 0; line-height: 1.4; }
    .diff-count { font-size: 0.8rem; color: var(--text-muted); padding: 4px 12px; background: rgba(255,255,255,0.06); border-radius: 20px; margin-top: 4px; }
    .completed-badge { font-size: 0.85rem; font-weight: 700; color: #10b981; margin-top: 4px; }
    .generating-badge { font-size: 0.8rem; color: var(--accent-blue); animation: pulseText 1.5s ease-in-out infinite; }
    @keyframes pulseText { 0%,100%{opacity:0.6} 50%{opacity:1} }

    .quiz-actions { display: flex; justify-content: center; gap: 16px; margin-top: 8px; }
    .view-results-btn {
      padding: 14px 36px; border: none; border-radius: var(--radius);
      font-weight: 600; font-size: 1.05rem;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white; cursor: pointer; transition: all 0.2s;
    }
    .view-results-btn:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.4); }
    .reset-btn {
      padding: 14px 36px; border: 1px solid var(--border); border-radius: var(--radius);
      font-weight: 600; background: transparent; color: var(--text-muted);
      cursor: pointer; transition: all 0.2s;
    }
    .reset-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }

    /* Playing Screen */
    .playing-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; max-width: 800px; margin-left: auto; margin-right: auto;
    }
    .back-btn {
      padding: 8px 20px; border: 1px solid var(--border); border-radius: var(--radius);
      background: transparent; color: var(--text-muted); cursor: pointer;
      font-size: 0.9rem; transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
    .playing-info { display: flex; align-items: center; gap: 20px; }
    .playing-difficulty { font-family: var(--font-display); font-weight: 700; font-size: 1rem; }
    .playing-score {
      padding: 6px 16px; background: var(--glass); border: 1px solid var(--border);
      border-radius: 20px; font-weight: 600; font-size: 0.9rem;
    }

    /* Quiz Card */
    .quiz-card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 32px;
      max-width: 800px;
      margin: 0 auto;
    }
    .q-number {
      font-size: 0.85rem; color: var(--accent-blue); font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .q-badge {
      font-size: 0.7rem; padding: 3px 12px; border-radius: 20px;
      font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .q-text {
      font-family: var(--font-display); font-size: 1.5rem;
      margin-bottom: 28px; line-height: 1.4;
    }
    .q-options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .q-option {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 20px; background: rgba(255,255,255,0.05);
      border: 2px solid var(--border); border-radius: var(--radius);
      text-align: left; transition: all 0.2s; color: var(--text-primary);
      cursor: pointer; font-size: 1rem; width: 100%;
    }
    .q-option:hover:not(:disabled) { border-color: var(--accent-blue); background: rgba(99,102,241,0.1); }
    .q-option.selected { border-color: var(--accent-blue); background: rgba(99,102,241,0.15); }
    .q-option.correct { border-color: #22c55e; background: rgba(34,197,94,0.15); }
    .q-option.wrong { border-color: #ef4444; background: rgba(239,68,68,0.15); }
    .q-opt-label { font-weight: 700; min-width: 24px; }
    .q-opt-text { flex: 1; }
    .q-explanation {
      padding: 16px; border-radius: var(--radius); margin-bottom: 24px; line-height: 1.5;
    }
    .q-explanation.correct { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
    .q-explanation.wrong { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
    .q-actions { display: flex; justify-content: center; }
    .check-btn, .next-btn {
      padding: 14px 32px; border: none; border-radius: var(--radius);
      font-weight: 600; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white; transition: all 0.2s; cursor: pointer; font-size: 1rem;
    }
    .check-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .next-btn:hover { box-shadow: 0 4px 16px rgba(139,92,246,0.4); }

    /* Results Screen */
    .result-screen { max-width: 600px; margin: 0 auto; text-align: center; }
    .result-title { font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 32px; }
    .grade-circle {
      width: 140px; height: 140px; border-radius: 50%; border: 6px solid;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; margin: 0 auto 24px; background: rgba(0,0,0,0.3);
      animation: scaleIn 0.5s ease;
    }
    @keyframes scaleIn { from{transform:scale(0)} to{transform:scale(1)} }
    .grade-text { font-size: 3rem; font-weight: 800; font-family: var(--font-display); line-height: 1; }
    .pct-text { font-size: 1.1rem; font-weight: 600; opacity: 0.8; margin-top: 2px; }
    .total-score { margin-bottom: 32px; }
    .total-num { font-size: 3.5rem; font-weight: 800; color: var(--accent-blue); font-family: var(--font-display); }
    .total-den { font-size: 1.5rem; color: var(--text-muted); }
    .breakdown {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 24px; margin-bottom: 32px; text-align: left;
    }
    .breakdown h3 { font-family: var(--font-display); margin-bottom: 20px; font-size: 1.1rem; }
    .breakdown-grid { display: flex; flex-direction: column; gap: 16px; }
    .breakdown-item { display: flex; flex-direction: column; gap: 8px; }
    .breakdown-header { display: flex; justify-content: space-between; font-size: 0.95rem; }
    .breakdown-bar { height: 10px; background: rgba(255,255,255,0.06); border-radius: 10px; overflow: hidden; }
    .breakdown-fill { height: 100%; border-radius: 10px; transition: width 1s ease; }
    .try-again-btn {
      padding: 14px 36px; border: none; border-radius: var(--radius);
      font-weight: 600; font-size: 1.05rem;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white; cursor: pointer; transition: all 0.2s;
    }
    .try-again-btn:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.4); }

    /* Back to paper link */
    .back-to-paper {
      display: inline-block; margin-bottom: 24px; color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .difficulty-grid { flex-direction: column; }
      .progress-bar-quiz { gap: 24px; }
      .quiz-title { font-size: 1.8rem; }
      .playing-header { flex-direction: column; gap: 12px; }
      .grade-circle { width: 110px; height: 110px; }
      .grade-text { font-size: 2.2rem; }
      .total-num { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="container" style="padding-top: 40px;">
    <a class="back-to-paper" href="#" id="backLink" onclick="goBack()">← Back to Paper</a>

    <!-- Selection Screen -->
    <div id="selectScreen">
      <h1 class="quiz-title">📝 Quiz Challenge</h1>
      <p class="quiz-subtitle" id="selectSubtitle">Select a difficulty level to start. Complete all 3 levels to see your total score.</p>

      <!-- Progress -->
      <div class="progress-bar-quiz" id="progressBar">
        <div class="progress-item-quiz">
          <div class="progress-dot" id="progressEasy" style="border-color: #10b981;">🟢</div>
          <span style="color: var(--text-muted);">Easy</span>
        </div>
        <div class="progress-item-quiz">
          <div class="progress-dot" id="progressMedium" style="border-color: #f59e0b;">🟡</div>
          <span style="color: var(--text-muted);">Medium</span>
        </div>
        <div class="progress-item-quiz">
          <div class="progress-dot" id="progressHard" style="border-color: #ef4444;">🔴</div>
          <span style="color: var(--text-muted);">Hard</span>
        </div>
      </div>

      <!-- Difficulty Cards -->
      <div class="difficulty-grid" id="difficultyGrid"></div>

      <!-- Actions -->
      <div class="quiz-actions" id="quizActions"></div>
    </div>

    <!-- Playing Screen -->
    <div id="playingScreen" class="hidden">
      <div class="playing-header">
        <button class="back-btn" onclick="backToSelect()">← Back to Levels</button>
        <div class="playing-info">
          <span class="playing-difficulty" id="currentDifficultyLabel">🟡 Medium</span>
          <span class="playing-score" id="currentScoreLabel">Score: 0/0</span>
        </div>
      </div>
      <div class="quiz-card" id="quizCard"></div>
    </div>

    <!-- Results Screen -->
    <div id="resultScreen" class="hidden">
      <div class="result-screen">
        <h1 class="result-title">🎉 Quiz Complete!</h1>
        <div class="grade-circle" id="gradeCircle">
          <span class="grade-text" id="gradeText">A+</span>
          <span class="pct-text" id="pctText">100%</span>
        </div>
        <div class="total-score">
          <span class="total-num" id="totalNum">0</span>
          <span class="total-den">/ 30</span>
        </div>
        <div class="breakdown">
          <h3>Score Breakdown</h3>
          <div class="breakdown-grid" id="breakdownGrid"></div>
        </div>
        <div class="quiz-actions">
          <button class="try-again-btn" onclick="resetAll()">🔄 Try Again</button>
        </div>
      </div>
    </div>

    <!-- Loading -->
    <div id="quizLoading" class="loading-container hidden">
      <div class="skeleton" style="width:300px;height:32px;margin:0 auto 24px;"></div>
      <div class="skeleton" style="width:100%;max-width:600px;height:200px;margin:0 auto;"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if (!checkAuth()) return;
    renderNavbar();

    const urlParams = new URLSearchParams(window.location.search);
    const paperId = urlParams.get('id');
    if (!paperId) {
      showToast('No paper ID provided');
      document.getElementById('selectScreen').innerHTML = '<p class="error-msg">No paper ID provided</p>';
      throw new Error('No paper ID');
    }

    // Set back link
    const backLink = document.getElementById('backLink');
    backLink.href = `paper.html?id=${paperId}`;

    const difficulties = [
      { key: 'easy', label: 'Easy', icon: '🟢', color: '#10b981', desc: 'Basic recall questions from the paper' },
      { key: 'medium', label: 'Medium', icon: '🟡', color: '#f59e0b', desc: 'Comprehension and application' },
      { key: 'hard', label: 'Hard', icon: '🔴', color: '#ef4444', desc: 'Analysis and deep understanding' },
    ];

    // State
    let scores = { easy: 0, medium: 0, hard: 0 };
    let completedLevels = [];
    let currentDifficulty = null;
    let questions = [];
    let currentIdx = 0;
    let currentScore = 0;
    let generating = false;

    // Initialize
    renderDifficultyCards();

    function renderDifficultyCards() {
      const grid = document.getElementById('difficultyGrid');
      const allCompleted = completedLevels.length >= 3;
      document.getElementById('selectSubtitle').textContent = allCompleted
        ? 'All levels completed! View your results below.'
        : 'Select a difficulty level to start. Complete all 3 levels to see your total score.';

      grid.innerHTML = difficulties.map(d => {
        const isCompleted = completedLevels.includes(d.key);
        const isDisabled = isCompleted || generating;
        return `
          <div class="difficulty-card ${isCompleted ? 'completed' : ''}"
               style="border-color: ${isCompleted ? d.color : isDisabled ? 'var(--border)' : d.color + '66'};
                      background: ${isCompleted ? d.color + '15' : 'var(--glass)'};"
               onclick="${!isCompleted ? `startDifficulty('${d.key}')` : ''}">
            <div class="diff-icon">${isCompleted ? '✅' : d.icon}</div>
            <h3 style="color: ${d.color}">${d.label}</h3>
            <p class="diff-desc">${d.desc}</p>
            <span class="diff-count">10 questions</span>
            ${isCompleted ? `<span class="completed-badge">Score: ${scores[d.key]}/10</span>` : ''}
            ${generating && currentDifficulty === d.key ? '<span class="generating-badge">Generating...</span>' : ''}
          </div>
        `;
      }).join('');

      // Update progress dots
      difficulties.forEach(d => {
        const el = document.getElementById(`progress${d.key.charAt(0).toUpperCase() + d.key.slice(1)}`);
        if (completedLevels.includes(d.key)) {
          el.textContent = '✓';
          el.classList.add('completed');
        }
      });

      // Actions
      const actions = document.getElementById('quizActions');
      if (allCompleted) {
        actions.innerHTML = `<button class="view-results-btn" onclick="showResults()">View Final Results 📊</button>`;
      } else if (completedLevels.length > 0) {
        actions.innerHTML = `<button class="reset-btn" onclick="resetAll()">Reset All Progress</button>`;
      } else {
        actions.innerHTML = '';
      }
    }

    async function startDifficulty(difficulty) {
      currentDifficulty = difficulty;
      currentIdx = 0;
      currentScore = 0;
      generating = true;
      renderDifficultyCards();

      document.getElementById('selectScreen').classList.add('hidden');
      document.getElementById('quizLoading').classList.remove('hidden');

      try {
        // Try to fetch existing questions
        const data = await apiGet(`/ai/quiz/${paperId}/${difficulty}`);
        questions = data.questions || [];
      } catch (err) {
        try {
          const data = await apiPost(`/ai/quiz/${paperId}/${difficulty}`, {});
          questions = data.questions || [];
        } catch (genErr) {
          showToast('Failed to generate quiz: ' + genErr.message);
          generating = false;
          document.getElementById('quizLoading').classList.add('hidden');
          document.getElementById('selectScreen').classList.remove('hidden');
          renderDifficultyCards();
          return;
        }
      }

      generating = false;
      document.getElementById('quizLoading').classList.add('hidden');
      document.getElementById('playingScreen').classList.remove('hidden');
      renderQuestion();
    }

    function renderQuestion() {
      if (!questions || questions.length === 0 || !questions[currentIdx]) {
        showToast('No questions available');
        backToSelect();
        return;
      }

      const q = questions[currentIdx];
      const diffColor = { easy: '#10b981', medium: '#f59e0b', hard: '#ef4444' }[currentDifficulty] || '#6366f1';
      
      // Header
      document.getElementById('currentDifficultyLabel').innerHTML = `
        ${difficulties.find(d => d.key === currentDifficulty)?.icon} ${currentDifficulty?.charAt(0).toUpperCase() + currentDifficulty?.slice(1)}
      `;
      document.getElementById('currentDifficultyLabel').style.color = diffColor;
      document.getElementById('currentScoreLabel').textContent = `Score: ${currentScore}/${currentIdx + 1}`;

      // Card
      const card = document.getElementById('quizCard');
      const letters = ['A', 'B', 'C', 'D'];
      
      card.innerHTML = `
        <div class="q-number">
          <span>Question ${currentIdx + 1} of ${questions.length}</span>
          <span class="q-badge" style="background: ${diffColor}22; color: ${diffColor}; border: 1px solid ${diffColor}44;">
            ${currentDifficulty?.charAt(0).toUpperCase() + currentDifficulty?.slice(1)}
          </span>
        </div>
        <div class="q-text">${q.question}</div>
        <div class="q-options" id="qOptions">
          ${q.options.map((opt, i) => `
            <div class="q-option" data-letter="${letters[i]}" onclick="selectOption('${letters[i]}')">
              <span class="q-opt-label">${letters[i]}.</span>
              <span class="q-opt-text">${opt.substring(3)}</span>
            </div>
          `).join('')}
        </div>
        <div id="qExplanation"></div>
        <div class="q-actions">
          <button class="check-btn" id="checkBtn" onclick="checkAnswer()" disabled>Check Answer</button>
        </div>
      `;

      window._selectedOption = null;
      window._answered = false;
    }

    function selectOption(letter) {
      if (window._answered) return;
      window._selectedOption = letter;

      document.querySelectorAll('.q-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.letter === letter);
      });

      document.getElementById('checkBtn').disabled = false;
    }

    function checkAnswer() {
      if (!window._selectedOption || window._answered) return;
      window._answered = true;

      const q = questions[currentIdx];
      const isCorrect = window._selectedOption === q.answer;

      if (isCorrect) {
        currentScore++;
        document.getElementById('currentScoreLabel').textContent = `Score: ${currentScore}/${currentIdx + 1}`;
      }

      // Mark options
      document.querySelectorAll('.q-option').forEach(el => {
        const letter = el.dataset.letter;
        el.style.cursor = 'default';
        if (letter === q.answer) el.classList.add('correct');
        else if (letter === window._selectedOption) el.classList.add('wrong');
      });

      // Show explanation
      const exp = document.getElementById('qExplanation');
      exp.innerHTML = `
        <div class="q-explanation ${isCorrect ? 'correct' : 'wrong'}">
          ${isCorrect ? '✓ Correct!' : '✗ Incorrect'} — ${q.explanation || 'No explanation provided.'}
        </div>
      `;

      // Next button
      const isLast = currentIdx === questions.length - 1;
      document.querySelector('.q-actions').innerHTML = `
        <button class="next-btn" onclick="nextQuestion()">${isLast ? 'Finish Level' : 'Next Question'}</button>
      `;
    }

    function nextQuestion() {
      if (currentIdx < questions.length - 1) {
        currentIdx++;
        renderQuestion();
      } else {
        // Level completed
        scores[currentDifficulty] = currentScore;
        completedLevels.push(currentDifficulty);
        
        document.getElementById('playingScreen').classList.add('hidden');
        
        if (completedLevels.length >= 3) {
          showResults();
        } else {
          document.getElementById('selectScreen').classList.remove('hidden');
          renderDifficultyCards();
          showToast(`${currentDifficulty?.charAt(0).toUpperCase() + currentDifficulty?.slice(1)} level completed! 🎉`, 'success');
        }
      }
    }

    function backToSelect() {
      currentDifficulty = null;
      questions = [];
      currentIdx = 0;
      currentScore = 0;
      document.getElementById('playingScreen').classList.add('hidden');
      document.getElementById('selectScreen').classList.remove('hidden');
      renderDifficultyCards();
    }

    function showResults() {
      const totalScore = (scores.easy || 0) + (scores.medium || 0) + (scores.hard || 0);
      const pct = Math.round((totalScore / 30) * 100);

      let grade = 'F';
      let gradeColor = '#ef4444';
      if (pct >= 90) { grade = 'A+'; gradeColor = '#10b981'; }
      else if (pct >= 80) { grade = 'A'; gradeColor = '#22c55e'; }
      else if (pct >= 70) { grade = 'B'; gradeColor = '#84cc16'; }
      else if (pct >= 60) { grade = 'C'; gradeColor = '#f59e0b'; }
      else if (pct >= 50) { grade = 'D'; gradeColor = '#f97316'; }

      document.getElementById('gradeCircle').style.borderColor = gradeColor;
      document.getElementById('gradeText').textContent = grade;
      document.getElementById('gradeText').style.color = gradeColor;
      document.getElementById('pctText').textContent = pct + '%';
      document.getElementById('totalNum').textContent = totalScore;

      const breakdown = document.getElementById('breakdownGrid');
      breakdown.innerHTML = difficulties.map(d => `
        <div class="breakdown-item">
          <div class="breakdown-header">
            <span>${d.icon} ${d.label}</span>
            <span style="color: ${d.color}; font-weight: 700;">${scores[d.key] || 0}/10</span>
          </div>
          <div class="breakdown-bar">
            <div class="breakdown-fill" style="width: ${((scores[d.key] || 0) / 10) * 100}%; background: ${d.color};"></div>
          </div>
        </div>
      `).join('');

      document.getElementById('selectScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.remove('hidden');
    }

    function resetAll() {
      scores = { easy: 0, medium: 0, hard: 0 };
      completedLevels = [];
      currentDifficulty = null;
      questions = [];
      currentIdx = 0;
      currentScore = 0;
      generating = false;

      // Reset progress dots
      difficulties.forEach(d => {
        const el = document.getElementById(`progress${d.key.charAt(0).toUpperCase() + d.key.slice(1)}`);
        el.textContent = d.icon;
        el.classList.remove('completed');
      });

      document.getElementById('resultScreen').classList.add('hidden');
      document.getElementById('selectScreen').classList.remove('hidden');
      renderDifficultyCards();
    }

    function goBack() {
      window.location.href = `paper.html?id=${paperId}`;
    }
  </script>
</body>
</html>
